<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ERP backend with FastAPI and PostgreSQL">
  <defs>
    <linearGradient id="erpBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ecfdf5"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <pattern id="erpDots" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#0a0a0a" fill-opacity="0.04"/>
    </pattern>
    <linearGradient id="chartFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#059669" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#059669" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="640" height="360" fill="url(#erpBg)"/>
  <rect width="640" height="360" fill="url(#erpDots)"/>

  <!-- Title -->
  <g transform="translate(48,52)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" letter-spacing="1.5" fill="#059669" opacity="0.85">ERP BACKEND</text>
    <text y="34" font-family="'Inter', system-ui, sans-serif" font-size="28" font-weight="700" fill="#0a0a0a" letter-spacing="-0.02em">Orders drive inventory</text>
  </g>

  <!-- Node: Order -->
  <g transform="translate(48,150)">
    <rect x="0" y="0" width="120" height="90" rx="10" fill="#ffffff" stroke="#d4d4d8"/>
    <text x="14" y="22" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" letter-spacing="1" fill="#71717a">ORDER</text>
    <line x1="14" y1="34" x2="106" y2="34" stroke="#e5e7eb"/>
    <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#0a0a0a">
      <text x="14" y="50">#4821</text>
      <text x="14" y="66" fill="#52525b">3 items</text>
      <text x="14" y="82" fill="#52525b">$248.50</text>
    </g>
    <rect x="82" y="46" width="24" height="14" rx="7" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="94" y="56" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="8" fill="#059669" font-weight="600">PAID</text>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(178,195)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#059669" stroke-width="1.75"/>
    <polyline points="36,-5 40,0 36,5" fill="none" stroke="#059669" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="20" y="-8" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#059669">delta</text>
  </g>

  <!-- Node: Inventory -->
  <g transform="translate(230,150)">
    <rect x="0" y="0" width="150" height="90" rx="10" fill="#ffffff" stroke="#d4d4d8"/>
    <text x="14" y="22" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" letter-spacing="1" fill="#71717a">INVENTORY</text>
    <line x1="14" y1="34" x2="136" y2="34" stroke="#e5e7eb"/>
    <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10">
      <text x="14" y="50" fill="#0a0a0a">SKU-A21</text>
      <text x="136" y="50" text-anchor="end" fill="#059669" font-weight="600">124</text>
      <text x="14" y="66" fill="#0a0a0a">SKU-B04</text>
      <text x="136" y="66" text-anchor="end" fill="#d97706" font-weight="600">18 ⚠</text>
      <text x="14" y="82" fill="#0a0a0a">SKU-C17</text>
      <text x="136" y="82" text-anchor="end" fill="#059669" font-weight="600">312</text>
    </g>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(390,195)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#2563eb" stroke-width="1.75"/>
    <polyline points="36,-5 40,0 36,5" fill="none" stroke="#2563eb" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="20" y="-8" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#2563eb">audit</text>
  </g>

  <!-- Node: Chart / History -->
  <g transform="translate(442,150)">
    <rect x="0" y="0" width="150" height="90" rx="10" fill="#ffffff" stroke="#d4d4d8"/>
    <text x="14" y="22" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" letter-spacing="1" fill="#71717a">STOCK · 30d</text>
    <line x1="14" y1="34" x2="136" y2="34" stroke="#e5e7eb"/>
    <!-- Sparkline -->
    <path d="M 14,74 L 30,66 L 46,70 L 62,58 L 78,62 L 94,50 L 110,54 L 126,44 L 136,42 L 136,80 L 14,80 Z" fill="url(#chartFill)"/>
    <path d="M 14,74 L 30,66 L 46,70 L 62,58 L 78,62 L 94,50 L 110,54 L 126,44 L 136,42" fill="none" stroke="#059669" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="136" cy="42" r="3" fill="#ffffff" stroke="#059669" stroke-width="1.75"/>
  </g>

  <!-- Footer strip -->
  <g transform="translate(48,320)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#71717a">
    <text>FastAPI</text>
    <text x="64">·</text>
    <text x="76">SQLAlchemy</text>
    <text x="152">·</text>
    <text x="164">PostgreSQL</text>
    <text x="236">·</text>
    <text x="248">JWT · RBAC</text>
    <text x="320">·</text>
    <text x="332">Docker Compose</text>
  </g>
</svg>
