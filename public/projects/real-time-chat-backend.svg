<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Real-time chat backend in Go">
  <defs>
    <linearGradient id="chatBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset="1" stop-color="#f5f3ff"/>
    </linearGradient>
    <pattern id="chatDots" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#0a0a0a" fill-opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="640" height="360" fill="url(#chatBg)"/>
  <rect width="640" height="360" fill="url(#chatDots)"/>

  <!-- Title -->
  <g transform="translate(48,52)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" letter-spacing="1.5" fill="#2563eb" opacity="0.85">REAL-TIME · GO · WEBSOCKET</text>
    <text y="34" font-family="'Inter', system-ui, sans-serif" font-size="28" font-weight="700" fill="#0a0a0a" letter-spacing="-0.02em">Live messages, persisted history</text>
  </g>

  <!-- Left: Client -->
  <g transform="translate(48,150)">
    <rect x="0" y="0" width="150" height="140" rx="12" fill="#ffffff" stroke="#d4d4d8"/>
    <text x="14" y="22" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" letter-spacing="1" fill="#71717a">CLIENT</text>
    <line x1="14" y1="30" x2="136" y2="30" stroke="#e5e7eb"/>

    <!-- Incoming bubble -->
    <g transform="translate(14,44)">
      <rect x="0" y="0" width="86" height="22" rx="11" fill="#f4f4f5"/>
      <text x="10" y="15" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#0a0a0a">hey, online?</text>
    </g>
    <!-- Outgoing bubble -->
    <g transform="translate(46,74)">
      <rect x="0" y="0" width="90" height="22" rx="11" fill="#2563eb"/>
      <text x="80" y="15" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#ffffff">yep — live</text>
    </g>
    <!-- Typing indicator -->
    <g transform="translate(14,108)">
      <rect x="0" y="0" width="46" height="18" rx="9" fill="#f4f4f5"/>
      <circle cx="12" cy="9" r="2" fill="#a1a1aa"/>
      <circle cx="22" cy="9" r="2" fill="#a1a1aa" opacity="0.6"/>
      <circle cx="32" cy="9" r="2" fill="#a1a1aa" opacity="0.3"/>
    </g>
  </g>

  <!-- Middle: WebSocket wave + label -->
  <g transform="translate(210,220)">
    <path d="M 0,0 C 10,-12 20,12 30,0 C 40,-12 50,12 60,0 C 70,-12 80,12 90,0 C 100,-12 110,12 120,0" fill="none" stroke="#2563eb" stroke-width="1.75" stroke-linecap="round"/>
    <path d="M 0,0 C 10,-12 20,12 30,0 C 40,-12 50,12 60,0 C 70,-12 80,12 90,0 C 100,-12 110,12 120,0" fill="none" stroke="#2563eb" stroke-width="1.75" stroke-linecap="round" transform="translate(0,-4)" opacity="0.35"/>
  </g>
  <g transform="translate(270,196)">
    <rect x="-24" y="-14" width="48" height="18" rx="9" fill="#ffffff" stroke="#93c5fd"/>
    <text x="0" y="-1" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#2563eb" font-weight="600">ws://</text>
  </g>

  <!-- Right: Server / DB stack -->
  <g transform="translate(346,150)">
    <rect x="0" y="0" width="246" height="140" rx="12" fill="#ffffff" stroke="#d4d4d8"/>
    <text x="14" y="22" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" letter-spacing="1" fill="#71717a">SERVER</text>
    <line x1="14" y1="30" x2="232" y2="30" stroke="#e5e7eb"/>

    <!-- Auth gate -->
    <g transform="translate(14,42)">
      <rect width="100" height="34" rx="8" fill="#f4f4f5" stroke="#e5e7eb"/>
      <text x="12" y="14" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#71717a">JWT</text>
      <text x="12" y="27" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#0a0a0a">auth · upgrade</text>
    </g>

    <!-- Hub -->
    <g transform="translate(124,42)">
      <rect width="108" height="34" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
      <text x="12" y="14" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#2563eb">HUB</text>
      <text x="12" y="27" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#0a0a0a">fan-out · presence</text>
    </g>

    <!-- Arrows down -->
    <g stroke="#a1a1aa" stroke-width="1.2">
      <line x1="64"  y1="80" x2="64"  y2="94"/>
      <line x1="178" y1="80" x2="178" y2="94"/>
    </g>

    <!-- Persistence row -->
    <g transform="translate(14,96)">
      <rect width="100" height="34" rx="8" fill="#ffffff" stroke="#d4d4d8"/>
      <text x="12" y="14" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#71717a">GORM</text>
      <text x="12" y="27" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#0a0a0a">messages</text>
    </g>
    <g transform="translate(124,96)">
      <rect width="108" height="34" rx="8" fill="#ffffff" stroke="#d4d4d8"/>
      <text x="12" y="14" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#71717a">SQLITE / PG</text>
      <text x="12" y="27" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#0a0a0a">history · users</text>
    </g>
  </g>

  <!-- Footer strip -->
  <g transform="translate(48,320)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#71717a">
    <text>Go</text>
    <text x="26">·</text>
    <text x="38">Gin</text>
    <text x="74">·</text>
    <text x="86">Gorilla WebSocket</text>
    <text x="204">·</text>
    <text x="216">GORM</text>
    <text x="260">·</text>
    <text x="272">JWT · bcrypt</text>
    <text x="352">·</text>
    <text x="364">presence &amp; history</text>
  </g>
</svg>
