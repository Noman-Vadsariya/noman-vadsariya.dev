<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Doc2LoRA hypernetwork vs. in-context RAG">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf5ff"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="leftTint" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rightTint" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0" stop-color="#2563eb" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#2563eb" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#0a0a0a" fill-opacity="0.045"/>
    </pattern>
  </defs>

  <rect width="640" height="360" fill="url(#bg)"/>
  <rect width="640" height="360" fill="url(#dots)"/>
  <rect x="0" y="0" width="320" height="360" fill="url(#leftTint)"/>
  <rect x="320" y="0" width="320" height="360" fill="url(#rightTint)"/>

  <!-- Center divider -->
  <line x1="320" y1="52" x2="320" y2="308" stroke="#d4d4d8" stroke-width="1" stroke-dasharray="3 5"/>
  <g transform="translate(320,180)">
    <circle r="18" fill="#ffffff" stroke="#d4d4d8"/>
    <text x="0" y="4" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#52525b" font-weight="600">vs</text>
  </g>

  <!-- Left: Hypernetwork -->
  <g transform="translate(48,60)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" letter-spacing="1.5" fill="#7c3aed" opacity="0.85">HYPERNETWORK</text>
    <text y="34" font-family="'Inter', system-ui, sans-serif" font-size="30" font-weight="700" fill="#0a0a0a" letter-spacing="-0.02em">Doc2LoRA</text>

    <!-- Doc stack -->
    <g transform="translate(0,80)">
      <rect x="6" y="6" width="42" height="52" rx="4" fill="#ffffff" stroke="#d4d4d8"/>
      <rect x="3" y="3" width="42" height="52" rx="4" fill="#ffffff" stroke="#d4d4d8"/>
      <rect x="0" y="0" width="42" height="52" rx="4" fill="#ffffff" stroke="#d4d4d8"/>
      <line x1="6" y1="12" x2="36" y2="12" stroke="#e5e7eb" stroke-width="2"/>
      <line x1="6" y1="20" x2="30" y2="20" stroke="#e5e7eb" stroke-width="2"/>
      <line x1="6" y1="28" x2="34" y2="28" stroke="#e5e7eb" stroke-width="2"/>
      <line x1="6" y1="36" x2="26" y2="36" stroke="#e5e7eb" stroke-width="2"/>
    </g>

    <!-- Arrow -->
    <g transform="translate(58,105)">
      <line x1="0" y1="0" x2="34" y2="0" stroke="#7c3aed" stroke-width="1.5"/>
      <polyline points="30,-4 34,0 30,4" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Weight matrix (LoRA-ish) -->
    <g transform="translate(100,80)">
      <rect x="0" y="0" width="80" height="52" rx="6" fill="#ffffff" stroke="#c4b5fd"/>
      <g fill="#7c3aed" opacity="0.85">
        <rect x="8"  y="8"  width="12" height="10" rx="2"/>
        <rect x="24" y="8"  width="12" height="10" rx="2" opacity="0.55"/>
        <rect x="40" y="8"  width="12" height="10" rx="2" opacity="0.7"/>
        <rect x="56" y="8"  width="12" height="10" rx="2" opacity="0.35"/>
        <rect x="8"  y="22" width="12" height="10" rx="2" opacity="0.4"/>
        <rect x="24" y="22" width="12" height="10" rx="2" opacity="0.85"/>
        <rect x="40" y="22" width="12" height="10" rx="2" opacity="0.55"/>
        <rect x="56" y="22" width="12" height="10" rx="2" opacity="0.7"/>
        <rect x="8"  y="36" width="12" height="10" rx="2" opacity="0.7"/>
        <rect x="24" y="36" width="12" height="10" rx="2" opacity="0.35"/>
        <rect x="40" y="36" width="12" height="10" rx="2" opacity="0.85"/>
        <rect x="56" y="36" width="12" height="10" rx="2" opacity="0.55"/>
      </g>
    </g>

    <text y="162" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#52525b">docs → adapter weights</text>
  </g>

  <!-- Right: In-context RAG -->
  <g transform="translate(360,60)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" letter-spacing="1.5" fill="#2563eb" opacity="0.85">IN-CONTEXT</text>
    <text y="34" font-family="'Inter', system-ui, sans-serif" font-size="30" font-weight="700" fill="#0a0a0a" letter-spacing="-0.02em">RAG</text>

    <!-- Query -->
    <g transform="translate(0,90)">
      <rect width="52" height="24" rx="12" fill="#ffffff" stroke="#93c5fd"/>
      <text x="26" y="16" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#2563eb">query</text>
    </g>

    <!-- Retrieval fan-out -->
    <g stroke="#2563eb" stroke-width="1.2" fill="none">
      <path d="M52,102 C 78,102 82,88 108,88"/>
      <path d="M52,102 C 78,102 82,102 108,102"/>
      <path d="M52,102 C 78,102 82,116 108,116"/>
    </g>

    <!-- Retrieved docs -->
    <g transform="translate(108,72)">
      <rect x="0"  y="0"  width="34" height="30" rx="4" fill="#ffffff" stroke="#93c5fd"/>
      <rect x="0"  y="20" width="34" height="30" rx="4" fill="#ffffff" stroke="#d4d4d8" opacity="0.9"/>
      <rect x="0"  y="40" width="34" height="30" rx="4" fill="#ffffff" stroke="#d4d4d8" opacity="0.85"/>
      <line x1="6"  y1="10" x2="28" y2="10" stroke="#dbeafe" stroke-width="2"/>
      <line x1="6"  y1="30" x2="24" y2="30" stroke="#e5e7eb" stroke-width="2"/>
      <line x1="6"  y1="50" x2="26" y2="50" stroke="#e5e7eb" stroke-width="2"/>
    </g>

    <text y="162" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#52525b">query → retrieve → generate</text>
  </g>

  <!-- Benchmark strip -->
  <g transform="translate(48,300)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#71717a">
    <text>HotpotQA</text>
    <text x="88">·</text>
    <text x="100">ASQA</text>
    <text x="152">·</text>
    <text x="164">Needle-in-Haystack</text>
    <text x="304">·</text>
    <text x="316">ColBERT + SPLADE</text>
  </g>
</svg>
