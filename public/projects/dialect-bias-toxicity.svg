<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mitigating dialect bias in toxicity detection">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fefce8"/>
      <stop offset="1" stop-color="#faf5ff"/>
    </linearGradient>
    <linearGradient id="curveSae" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2563eb" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#2563eb" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="curveAae" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d97706" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#d97706" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots2" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#0a0a0a" fill-opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="640" height="360" fill="url(#bg2)"/>
  <rect width="640" height="360" fill="url(#dots2)"/>

  <!-- Title block -->
  <g transform="translate(48,52)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" letter-spacing="1.5" fill="#7c3aed" opacity="0.85">FAIRNESS · TOXICITY DETECTION</text>
    <text y="34" font-family="'Inter', system-ui, sans-serif" font-size="26" font-weight="700" fill="#0a0a0a" letter-spacing="-0.02em">Mitigating dialect bias</text>
  </g>

  <!-- Plot area -->
  <g transform="translate(48,140)">
    <!-- Axis -->
    <line x1="0" y1="140" x2="544" y2="140" stroke="#d4d4d8" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="140" stroke="#d4d4d8" stroke-width="1"/>
    <text x="0" y="156" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#71717a">p(toxic)</text>
    <text x="544" y="156" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#71717a">1.0</text>

    <!-- SAE curve (blue), centered ~ 0.35 -->
    <path d="M 0,140 C 60,140 110,20 190,20 C 270,20 320,140 380,140 L 380,140 Z" fill="url(#curveSae)"/>
    <path d="M 0,140 C 60,140 110,20 190,20 C 270,20 320,140 380,140" fill="none" stroke="#2563eb" stroke-width="1.75"/>

    <!-- AAE curve (amber), centered ~ 0.55 (shifted right) -->
    <path d="M 130,140 C 190,140 240,32 320,32 C 400,32 450,140 510,140 L 510,140 Z" fill="url(#curveAae)"/>
    <path d="M 130,140 C 190,140 240,32 320,32 C 400,32 450,140 510,140" fill="none" stroke="#d97706" stroke-width="1.75"/>

    <!-- Threshold line -->
    <line x1="330" y1="4" x2="330" y2="140" stroke="#0a0a0a" stroke-width="1" stroke-dasharray="4 4" opacity="0.55"/>
    <g transform="translate(330,-6)">
      <rect x="-20" y="-14" width="40" height="16" rx="8" fill="#ffffff" stroke="#d4d4d8"/>
      <text x="0" y="-2" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#0a0a0a">τ</text>
    </g>

    <!-- FPR shaded region for AAE past threshold (small) -->
    <path d="M 330,140 C 380,140 430,140 510,140 L 510,140 L 330,140 Z" fill="#d97706" fill-opacity="0.08"/>

    <!-- Gap indicator -->
    <g transform="translate(228,60)">
      <line x1="0" y1="0" x2="80" y2="0" stroke="#71717a" stroke-width="1"/>
      <polyline points="4,-4 0,0 4,4" fill="none" stroke="#71717a" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="76,-4 80,0 76,4" fill="none" stroke="#71717a" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="26" y="-9" width="28" height="16" rx="4" fill="#ffffff" stroke="#e5e7eb"/>
      <text x="40" y="3" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#52525b">gap</text>
    </g>

    <!-- Legend / labels -->
    <g transform="translate(150,132)">
      <circle cx="0" cy="0" r="4" fill="#2563eb"/>
      <text x="10" y="4" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#0a0a0a">SAE</text>
    </g>
    <g transform="translate(440,132)">
      <circle cx="0" cy="0" r="4" fill="#d97706"/>
      <text x="10" y="4" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#0a0a0a">AAE</text>
    </g>
  </g>

  <!-- Footer strip -->
  <g transform="translate(48,320)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#71717a">
    <text>Adversarial EO</text>
    <text x="112">·</text>
    <text x="124">Vector Scaling</text>
    <text x="222">·</text>
    <text x="234">Abstain-band</text>
    <text x="326">·</text>
    <text x="338">TwitterAAE → HateXplain</text>
  </g>
</svg>
